<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Análise IA • BMAND</title>

    <link rel="stylesheet" href="../../assets/css/analise.css">
    <link rel="stylesheet" href="../../assets/css/global.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header>

        <div class="logo">
            <h2>BMAND</h2>
            <span>Sistema Inteligente de Diagnóstico Médico</span>
        </div>

        <nav>
            <a href="/projeto/index.html">Voltar</a>
        </nav>

    </header>
    <main>

        <section class="analise-page">

            <h1>Análise Inteligente de Mamografia</h1>

            <p>
                Envie uma imagem médica para que a IA realize a análise automática.
            </p>

            <div class="upload-box">

                <input type="file" id="imageInput" accept="image/*">

                <div class="preview-container">

                    <img id="preview" src="" alt="">

                </div>

                <button id="analisarBtn">
                    Analisar Imagem
                </button>
                <a href="../login/login.html" class="dashboard-btn">
                    Ver Dashboard
                </a>

            </div>

            <div class="loading" id="loading">

                <div class="loader"></div>

                <p>Processando imagem...</p>

            </div>

            <div class="resultado" id="resultado">

                <h2>Resultado da IA</h2>

                <div class="resultado-cards">

                    <div class="resultado-card">
                        <span>Risco Detectado</span>
                        <strong id="risco">87%</strong>
                    </div>

                    <div class="resultado-card">
                        <span>Confiança</span>
                        <strong>95%</strong>
                    </div>

                    <div class="resultado-card">
                        <span>Classificação</span>
                        <strong id="classificacao">
                            Suspeita
                        </strong>
                    </div>

                </div>

            </div>

        </section>
    </main>

    <script src="../../assets/js/analise.js"></script>
</body>

</html>
